name: memory_claw
version: 2.0.0
description: "Memory-Claw v2 — LanceDB-backed semantic memory with Mistral embeddings and LLM-powered auto-extraction. Provides vector storage, semantic search, tiered memory management, session-end summaries, and pre-compress insight preservation."
pip_dependencies:
  - lancedb>=0.6.0
  - pyarrow>=14.0.0
  - numpy>=1.24.0
  - requests>=2.28.0
hooks:
  - on_session_end
  - on_pre_compress
